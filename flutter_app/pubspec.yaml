name: clearcut
description: ClearCut — AI Media Toolkit
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  firebase_messaging: ^15.0.0
  google_sign_in: ^6.2.1

  # HTTP
  dio: ^5.4.3

  # File & Image
  image_picker: ^1.1.2
  file_picker: ^8.0.3
  path_provider: ^2.1.3
  cached_network_image: ^3.3.1

  # UI
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3
  fluttertoast: ^8.2.5
  photo_view: ^0.15.0

  # State
  provider: ^6.1.2

  # Storage
  shared_preferences: ^2.3.0
  flutter_secure_storage: ^9.0.0

  # Payments
  razorpay_flutter: ^1.3.7

  # Utils
  uuid: ^4.4.0
  intl: ^0.19.0
  url_launcher: ^6.3.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
