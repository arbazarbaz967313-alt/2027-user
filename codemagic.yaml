workflows:
  android-release:
    name: ClearCut Android APK
    max_build_duration: 60
    environment:
      flutter: 3.22.0
      java: 17
    scripts:
      - name: Get Flutter packages
        script: |
          cd flutter_app
          flutter pub get

      - name: Build APK
        script: |
          cd flutter_app
          flutter build apk --debug \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUMBER

    artifacts:
      - flutter_app/build/app/outputs/flutter-apk/app-debug.apk

    publishing:
      email:
        recipients:
          - arbazarbaz967313@gmail.com
        notify:
          success: true
          failure: true
